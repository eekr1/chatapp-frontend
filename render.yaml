# NOTE:
# This file is only used when the Render service is managed via Blueprint sync.
# If your service is a classic Static Site (manual dashboard setup), this file is ignored.
# In classic mode, configure Redirects/Rewrites from Render Dashboard.
services:
  - type: web
    runtime: static
    # IMPORTANT: replace with your existing Render Static Site service name
    # before enabling Blueprint sync, so Render updates the same service.
    name: chatapp-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
